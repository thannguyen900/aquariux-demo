server:
  port: 8080

spring:
  application:
    name: aquariux-demo
  datasource:
    url: jdbc:h2:mem:demo_db;
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

trading:
  external:
    binance-url: https://api.binance.com/api/v3/ticker/bookTicker
    huobi-url: https://api.huobi.pro/market/tickers
  scheduler:
    fixed-rate-ms: 10000
  supported-pairs:
    - BTCUSDT
    - ETHUSDT